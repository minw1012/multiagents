<svg width="1600" height="860" viewBox="0 0 1600 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11V1Z" fill="#262626"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .title { font: 700 34px Georgia, 'Times New Roman', serif; fill: #111111; }
      .subtitle { font: 400 17px Helvetica, Arial, sans-serif; fill: #444444; }
      .section { font: 700 18px Helvetica, Arial, sans-serif; fill: #212121; }
      .node { font: 700 17px Helvetica, Arial, sans-serif; fill: #171717; }
      .small { font: 400 14px Helvetica, Arial, sans-serif; fill: #434343; }
      .label { font: 600 14px Helvetica, Arial, sans-serif; fill: #323232; }
      .caption { font: 400 16px Helvetica, Arial, sans-serif; fill: #424242; }
    </style>
  </defs>

  <rect width="1600" height="860" fill="#FFFFFF"/>
  <rect x="48" y="44" width="1504" height="772" rx="28" fill="#FCFCFC" stroke="#BCBCBC" stroke-width="1.5"/>

  <text x="84" y="108" class="title">Model-Driven Tool-Using Runtime</text>
  <text x="84" y="140" class="subtitle">The model decides; the runtime executes, checks, and records.</text>

  <rect x="84" y="184" width="1050" height="544" rx="24" fill="#FFFFFF" stroke="#CBCBCB" stroke-width="1.5"/>
  <text x="114" y="222" class="section">Dynamic Controller Loop</text>

  <rect x="1170" y="184" width="338" height="544" rx="24" fill="#FAFAFA" stroke="#CBCBCB" stroke-width="1.5"/>
  <text x="1200" y="222" class="section">Runtime Harness</text>

  <rect x="142" y="324" width="176" height="58" rx="18" fill="#FFFFFF" stroke="#8E8E8E" stroke-width="1.5"/>
  <text x="230" y="359" text-anchor="middle" class="node">User Request</text>

  <rect x="384" y="324" width="178" height="58" rx="18" fill="#FFFFFF" stroke="#8E8E8E" stroke-width="1.5"/>
  <text x="473" y="359" text-anchor="middle" class="node">messages</text>

  <rect x="628" y="312" width="222" height="82" rx="20" fill="#FFFFFF" stroke="#5E5E5E" stroke-width="1.8" filter="url(#shadow)"/>
  <rect x="628" y="312" width="222" height="8" rx="4" fill="#222222"/>
  <text x="739" y="361" text-anchor="middle" class="node" style="font-size:19px;">LLM Controller</text>

  <polygon points="972,268 1096,390 972,512 848,390" fill="#F1F1F1" stroke="#666666" stroke-width="2"/>
  <text x="972" y="382" text-anchor="middle" class="node" style="font-size:18px;">Tool needed</text>
  <text x="972" y="410" text-anchor="middle" class="node" style="font-size:18px;">now?</text>

  <rect x="1240" y="298" width="210" height="58" rx="18" fill="#FFFFFF" stroke="#7A7A7A" stroke-width="1.6"/>
  <text x="1345" y="334" text-anchor="middle" class="node">Execute Tools</text>

  <rect x="1240" y="406" width="210" height="58" rx="18" fill="#FFFFFF" stroke="#7A7A7A" stroke-width="1.6"/>
  <text x="1345" y="442" text-anchor="middle" class="node">Policy Check</text>

  <rect x="1222" y="514" width="246" height="72" rx="18" fill="#FFFFFF" stroke="#7A7A7A" stroke-width="1.6"/>
  <text x="1345" y="546" text-anchor="middle" class="node">Append Result</text>
  <text x="1345" y="570" text-anchor="middle" class="small">+ observations</text>

  <polygon points="700,486 810,590 700,694 590,590" fill="#F1F1F1" stroke="#666666" stroke-width="2"/>
  <text x="700" y="580" text-anchor="middle" class="node" style="font-size:17px;">Enough info</text>
  <text x="700" y="607" text-anchor="middle" class="node" style="font-size:17px;">to answer?</text>

  <rect x="570" y="700" width="210" height="62" rx="18" fill="#FFFFFF" stroke="#232323" stroke-width="2"/>
  <text x="675" y="734" text-anchor="middle" class="node">FINAL</text>
  <text x="675" y="755" text-anchor="middle" class="small">Return answer</text>

  <rect x="840" y="700" width="254" height="62" rx="18" fill="#F7F7F7" stroke="#565656" stroke-width="1.8" stroke-dasharray="7 5"/>
  <text x="967" y="734" text-anchor="middle" class="node">CLARIFY / CHAT</text>
  <text x="967" y="755" text-anchor="middle" class="small">Ask for missing info</text>

  <rect x="1218" y="272" width="242" height="66" rx="18" fill="none" stroke="#D7D7D7" stroke-width="1"/>
  <rect x="1218" y="380" width="242" height="66" rx="18" fill="none" stroke="#D7D7D7" stroke-width="1"/>
  <rect x="1204" y="488" width="272" height="90" rx="18" fill="none" stroke="#D7D7D7" stroke-width="1"/>

  <rect x="1230" y="294" width="236" height="58" rx="16" fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1.4"/>
  <text x="1348" y="330" text-anchor="middle" class="node" style="font-size:16px;">Tool Registry</text>

  <rect x="1230" y="402" width="236" height="58" rx="16" fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1.4"/>
  <text x="1348" y="438" text-anchor="middle" class="node" style="font-size:16px;">Execution Policy</text>

  <rect x="1230" y="528" width="236" height="58" rx="16" fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1.4"/>
  <text x="1348" y="564" text-anchor="middle" class="node" style="font-size:16px;">Memory Store</text>

  <rect x="1230" y="618" width="236" height="58" rx="16" fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1.4"/>
  <text x="1348" y="654" text-anchor="middle" class="node" style="font-size:16px;">Event Log</text>

  <path d="M318 353H384" stroke="#262626" stroke-width="2.8" marker-end="url(#arrow)"/>
  <path d="M562 353H628" stroke="#262626" stroke-width="2.8" marker-end="url(#arrow)"/>
  <path d="M850 353H888" stroke="#262626" stroke-width="2.8" marker-end="url(#arrow)"/>

  <path d="M1096 344H1240" stroke="#262626" stroke-width="2.8" marker-end="url(#arrow)"/>
  <text x="1168" y="328" text-anchor="middle" class="label">Yes</text>

  <path d="M1345 356V406" stroke="#262626" stroke-width="2.8" marker-end="url(#arrow)"/>
  <path d="M1345 464V514" stroke="#262626" stroke-width="2.8" marker-end="url(#arrow)"/>

  <path d="M848 462L782 522" stroke="#262626" stroke-width="2.8" marker-end="url(#arrow)"/>
  <text x="812" y="492" class="label">No</text>

  <path d="M810 590H570" stroke="#262626" stroke-width="2.8" marker-end="url(#arrow)"/>
  <text x="690" y="574" text-anchor="middle" class="label">Yes</text>

  <path d="M700 694V700" stroke="#262626" stroke-width="2.8" marker-end="url(#arrow)"/>

  <path d="M810 590H840" stroke="#262626" stroke-width="2.8" marker-end="url(#arrow)"/>
  <text x="824" y="574" class="label">No</text>

  <path d="M1222 550C1088 550 1024 620 978 700" stroke="#262626" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>

  <path d="M1222 550C1098 550 1042 616 996 690C916 818 688 822 580 754C460 680 422 536 473 382" stroke="#262626" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>

  <path d="M1450 323H1490" stroke="#8D8D8D" stroke-width="1.8"/>
  <path d="M1450 431H1490" stroke="#8D8D8D" stroke-width="1.8"/>
  <path d="M1348 352V402" stroke="#8D8D8D" stroke-width="1.8" stroke-dasharray="5 5"/>
  <path d="M1348 586V618" stroke="#8D8D8D" stroke-width="1.8" stroke-dasharray="5 5"/>

  <circle cx="1490" cy="323" r="4" fill="#8D8D8D"/>
  <circle cx="1490" cy="431" r="4" fill="#8D8D8D"/>

  <line x1="84" y1="770" x2="1510" y2="770" stroke="#D0D0D0"/>
  <text x="84" y="808" class="caption">If no tool is needed, the controller either answers directly or asks for one missing constraint.</text>
</svg>

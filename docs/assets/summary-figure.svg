<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F6F6F6"/>
    </linearGradient>
    <linearGradient id="decision" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#444444"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3A3A3A"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1400" height="760" fill="#FFFFFF"/>

  <rect x="56" y="52" width="1288" height="656" rx="28" fill="url(#panel)" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="86" y="110" fill="#111111" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">
    Model-Driven Tool-Using Runtime
  </text>
  <text x="86" y="142" fill="#444444" font-family="Helvetica, Arial, sans-serif" font-size="18">
    The model controls the loop; the runtime executes tools, enforces policy, and records state.
  </text>

  <rect x="86" y="180" width="860" height="472" rx="24" fill="#FFFFFF" stroke="#CFCFCF" stroke-width="1.5"/>
  <text x="114" y="218" fill="#222222" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">
    Dynamic Controller Loop
  </text>

  <rect x="1008" y="180" width="294" height="472" rx="24" fill="#FCFCFC" stroke="#CFCFCF" stroke-width="1.5"/>
  <text x="1038" y="218" fill="#222222" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">
    Runtime Harness
  </text>

  <rect x="132" y="280" width="150" height="52" rx="16" fill="#FFFFFF" stroke="#8E8E8E" stroke-width="1.5"/>
  <text x="207" y="312" text-anchor="middle" fill="#111111" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700">
    User Request
  </text>

  <rect x="336" y="280" width="140" height="52" rx="16" fill="#FFFFFF" stroke="#8E8E8E" stroke-width="1.5"/>
  <text x="406" y="312" text-anchor="middle" fill="#111111" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700">
    messages
  </text>

  <rect x="530" y="268" width="176" height="76" rx="20" fill="#FFFFFF" stroke="#6E6E6E" stroke-width="1.8" filter="url(#shadow)"/>
  <rect x="530" y="268" width="176" height="8" rx="4" fill="url(#accent)"/>
  <text x="618" y="313" text-anchor="middle" fill="#111111" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">
    LLM Controller
  </text>

  <polygon points="785,244 885,342 785,440 685,342" fill="url(#decision)" stroke="#6E6E6E" stroke-width="2"/>
  <text x="785" y="334" text-anchor="middle" fill="#111111" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">
    Need tool
  </text>
  <text x="785" y="364" text-anchor="middle" fill="#111111" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">
    call now?
  </text>

  <rect x="474" y="504" width="164" height="60" rx="18" fill="#FFFFFF" stroke="#222222" stroke-width="2.2"/>
  <text x="556" y="530" text-anchor="middle" fill="#111111" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">
    FINAL
  </text>
  <text x="556" y="552" text-anchor="middle" fill="#333333" font-family="Helvetica, Arial, sans-serif" font-size="16">
    Return final answer
  </text>

  <rect x="700" y="504" width="186" height="60" rx="18" fill="#F4F4F4" stroke="#555555" stroke-width="1.8" stroke-dasharray="6 5"/>
  <text x="793" y="530" text-anchor="middle" fill="#111111" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">
    CLARIFY / CHAT
  </text>
  <text x="793" y="552" text-anchor="middle" fill="#333333" font-family="Helvetica, Arial, sans-serif" font-size="16">
    Ask focused question
  </text>

  <polygon points="522,392 622,472 522,552 422,472" fill="url(#decision)" stroke="#6E6E6E" stroke-width="2"/>
  <text x="522" y="465" text-anchor="middle" fill="#111111" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">
    Enough info
  </text>
  <text x="522" y="494" text-anchor="middle" fill="#111111" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">
    to answer?
  </text>

  <rect x="932" y="264" width="194" height="58" rx="18" fill="#FFFFFF" stroke="#8E8E8E" stroke-width="1.5"/>
  <text x="1029" y="299" text-anchor="middle" fill="#111111" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">
    Execute Tool Calls
  </text>

  <rect x="932" y="380" width="194" height="58" rx="18" fill="#FFFFFF" stroke="#8E8E8E" stroke-width="1.5"/>
  <text x="1029" y="414" text-anchor="middle" fill="#111111" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">
    Policy Check
  </text>

  <rect x="902" y="496" width="254" height="72" rx="18" fill="#FFFFFF" stroke="#8E8E8E" stroke-width="1.5"/>
  <text x="1029" y="528" text-anchor="middle" fill="#111111" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">
    Append tool_result
  </text>
  <text x="1029" y="552" text-anchor="middle" fill="#333333" font-family="Helvetica, Arial, sans-serif" font-size="18">
    + observations
  </text>

  <rect x="1040" y="266" width="230" height="58" rx="16" fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1.4"/>
  <text x="1155" y="300" text-anchor="middle" fill="#222222" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">
    Tool Registry
  </text>

  <rect x="1040" y="378" width="230" height="58" rx="16" fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1.4"/>
  <text x="1155" y="412" text-anchor="middle" fill="#222222" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">
    Execution Policy
  </text>

  <rect x="1040" y="490" width="230" height="58" rx="16" fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1.4"/>
  <text x="1155" y="524" text-anchor="middle" fill="#222222" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">
    Memory Store
  </text>

  <rect x="1040" y="570" width="230" height="58" rx="16" fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1.4"/>
  <text x="1155" y="604" text-anchor="middle" fill="#222222" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">
    Event Log
  </text>

  <path d="M282 306 H336" stroke="#3A3A3A" stroke-width="2.6" marker-end="url(#arrow)"/>
  <path d="M476 306 H530" stroke="#3A3A3A" stroke-width="2.6" marker-end="url(#arrow)"/>
  <path d="M706 306 H734" stroke="#3A3A3A" stroke-width="2.6" marker-end="url(#arrow)"/>

  <path d="M856 308 H932" stroke="#3A3A3A" stroke-width="2.6" marker-end="url(#arrow)"/>
  <text x="895" y="296" text-anchor="middle" fill="#333333" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700">
    Yes
  </text>

  <path d="M932 322 C932 352 980 350 1000 380" stroke="#3A3A3A" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M1029 438 V496" stroke="#3A3A3A" stroke-width="2.6" marker-end="url(#arrow)"/>
  <path d="M902 532 C770 532 730 596 618 596 C496 596 406 510 406 332" stroke="#3A3A3A" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>

  <path d="M714 376 C656 398 612 424 574 447" stroke="#3A3A3A" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <text x="652" y="413" fill="#333333" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700">
    No
  </text>

  <path d="M462 526 H638" stroke="#3A3A3A" stroke-width="2.6" marker-end="url(#arrow)"/>
  <text x="640" y="516" fill="#333333" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700">
    No
  </text>

  <path d="M572 448 C616 420 648 396 700 392" stroke="#3A3A3A" stroke-width="2.6" fill="none"/>
  <path d="M622 472 H700" stroke="#3A3A3A" stroke-width="2.6" marker-end="url(#arrow)"/>
  <text x="656" y="460" fill="#333333" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700">
    Yes
  </text>

  <path d="M1126 294 H1040" stroke="#8E8E8E" stroke-width="2"/>
  <path d="M1126 408 H1126" stroke="#8E8E8E" stroke-width="2"/>
  <path d="M1126 522 H1155" stroke="#8E8E8E" stroke-width="2"/>
  <path d="M1126 604 H1155" stroke="#8E8E8E" stroke-width="2"/>

  <circle cx="1126" cy="293" r="4" fill="#8E8E8E"/>
  <circle cx="1126" cy="408" r="4" fill="#8E8E8E"/>
  <circle cx="1155" cy="522" r="4" fill="#8E8E8E"/>
  <circle cx="1155" cy="604" r="4" fill="#8E8E8E"/>

  <path d="M1126 293 V408" stroke="#8E8E8E" stroke-width="2" stroke-dasharray="5 5"/>
  <path d="M1155 522 V604" stroke="#8E8E8E" stroke-width="2" stroke-dasharray="5 5"/>

  <rect x="86" y="678" width="1288" height="1" fill="#D0D0D0"/>
  <text x="86" y="714" fill="#4A4A4A" font-family="Helvetica, Arial, sans-serif" font-size="16">
    Note: when no tool is needed, the controller may either finish immediately or ask a clarification question if information is still missing.
  </text>
</svg>

<svg width="1600" height="860" viewBox="0 0 1600 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11V1Z" fill="#2B2B2B"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 34px Georgia, 'Times New Roman', serif; fill: #111111; }
      .subtitle { font: 400 17px Helvetica, Arial, sans-serif; fill: #444444; }
      .section { font: 700 18px Helvetica, Arial, sans-serif; fill: #222222; }
      .node { font: 700 17px Helvetica, Arial, sans-serif; fill: #171717; }
      .label { font: 600 14px Helvetica, Arial, sans-serif; fill: #333333; }
      .small { font: 400 14px Helvetica, Arial, sans-serif; fill: #444444; }
      .caption { font: 400 16px Helvetica, Arial, sans-serif; fill: #424242; }
    </style>
  </defs>

  <rect width="1600" height="860" fill="#FFFFFF"/>
  <rect x="52" y="48" width="1496" height="764" rx="28" fill="#FCFCFC" stroke="#BDBDBD" stroke-width="1.5"/>

  <text x="88" y="112" class="title">Model-Driven Tool-Using Runtime</text>
  <text x="88" y="144" class="subtitle">The model decides; the runtime executes, checks, and records.</text>

  <rect x="88" y="188" width="1020" height="536" rx="24" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1.5"/>
  <text x="118" y="226" class="section">Dynamic Controller Loop</text>

  <rect x="1144" y="188" width="364" height="536" rx="24" fill="#FAFAFA" stroke="#CCCCCC" stroke-width="1.5"/>
  <text x="1174" y="226" class="section">Runtime Harness</text>

  <rect x="146" y="318" width="176" height="58" rx="18" fill="#FFFFFF" stroke="#8A8A8A" stroke-width="1.5"/>
  <text x="234" y="353" text-anchor="middle" class="node">User Request</text>

  <rect x="388" y="318" width="170" height="58" rx="18" fill="#FFFFFF" stroke="#8A8A8A" stroke-width="1.5"/>
  <text x="473" y="353" text-anchor="middle" class="node">messages</text>

  <rect x="624" y="306" width="214" height="82" rx="20" fill="#FFFFFF" stroke="#5F5F5F" stroke-width="1.8" filter="url(#softShadow)"/>
  <rect x="624" y="306" width="214" height="8" rx="4" fill="#222222"/>
  <text x="731" y="355" text-anchor="middle" class="node" style="font-size:19px;">LLM Controller</text>

  <polygon points="948,268 1068,382 948,496 828,382" fill="#F2F2F2" stroke="#666666" stroke-width="2"/>
  <text x="948" y="374" text-anchor="middle" class="node" style="font-size:18px;">Tool needed</text>
  <text x="948" y="401" text-anchor="middle" class="node" style="font-size:18px;">call now?</text>

  <rect x="1200" y="292" width="230" height="60" rx="18" fill="#FFFFFF" stroke="#7C7C7C" stroke-width="1.6"/>
  <text x="1315" y="329" text-anchor="middle" class="node">Execute Tool Calls</text>

  <rect x="1200" y="404" width="230" height="60" rx="18" fill="#FFFFFF" stroke="#7C7C7C" stroke-width="1.6"/>
  <text x="1315" y="441" text-anchor="middle" class="node">Policy Check</text>

  <rect x="1180" y="516" width="270" height="76" rx="18" fill="#FFFFFF" stroke="#7C7C7C" stroke-width="1.6"/>
  <text x="1315" y="549" text-anchor="middle" class="node">Append result</text>
  <text x="1315" y="573" text-anchor="middle" class="small">+ observations</text>

  <polygon points="644,454 754,556 644,658 534,556" fill="#F2F2F2" stroke="#666666" stroke-width="2"/>
  <text x="644" y="548" text-anchor="middle" class="node" style="font-size:17px;">Enough info</text>
  <text x="644" y="575" text-anchor="middle" class="node" style="font-size:17px;">to answer?</text>

  <rect x="500" y="672" width="208" height="62" rx="18" fill="#FFFFFF" stroke="#222222" stroke-width="2"/>
  <text x="604" y="706" text-anchor="middle" class="node">FINAL</text>
  <text x="604" y="726" text-anchor="middle" class="small">Return answer</text>

  <rect x="792" y="672" width="244" height="62" rx="18" fill="#F7F7F7" stroke="#555555" stroke-width="1.8" stroke-dasharray="7 5"/>
  <text x="914" y="705" text-anchor="middle" class="node">CLARIFY / CHAT</text>
  <text x="914" y="726" text-anchor="middle" class="small">Ask for missing info</text>

  <rect x="1190" y="286" width="278" height="70" rx="18" fill="none" stroke="#D6D6D6" stroke-width="1"/>
  <rect x="1190" y="398" width="278" height="70" rx="18" fill="none" stroke="#D6D6D6" stroke-width="1"/>
  <rect x="1190" y="510" width="278" height="88" rx="18" fill="none" stroke="#D6D6D6" stroke-width="1"/>

  <rect x="1218" y="300" width="248" height="58" rx="16" fill="#FFFFFF" stroke="#A6A6A6" stroke-width="1.4"/>
  <text x="1342" y="336" text-anchor="middle" class="node" style="font-size:16px;">Tool Registry</text>

  <rect x="1218" y="412" width="248" height="58" rx="16" fill="#FFFFFF" stroke="#A6A6A6" stroke-width="1.4"/>
  <text x="1342" y="448" text-anchor="middle" class="node" style="font-size:16px;">Execution Policy</text>

  <rect x="1218" y="530" width="248" height="58" rx="16" fill="#FFFFFF" stroke="#A6A6A6" stroke-width="1.4"/>
  <text x="1342" y="566" text-anchor="middle" class="node" style="font-size:16px;">Memory Store</text>

  <rect x="1218" y="620" width="248" height="58" rx="16" fill="#FFFFFF" stroke="#A6A6A6" stroke-width="1.4"/>
  <text x="1342" y="656" text-anchor="middle" class="node" style="font-size:16px;">Event Log</text>

  <path d="M322 347H388" stroke="#2B2B2B" stroke-width="2.8" marker-end="url(#arrow)"/>
  <path d="M558 347H624" stroke="#2B2B2B" stroke-width="2.8" marker-end="url(#arrow)"/>
  <path d="M838 347H868" stroke="#2B2B2B" stroke-width="2.8" marker-end="url(#arrow)"/>

  <path d="M1068 340H1200" stroke="#2B2B2B" stroke-width="2.8" marker-end="url(#arrow)"/>
  <text x="1134" y="324" text-anchor="middle" class="label">Yes</text>

  <path d="M1315 352V404" stroke="#2B2B2B" stroke-width="2.8" marker-end="url(#arrow)"/>
  <path d="M1315 464V516" stroke="#2B2B2B" stroke-width="2.8" marker-end="url(#arrow)"/>

  <path d="M1180 554C1064 554 988 598 932 672" stroke="#2B2B2B" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>

  <path d="M1180 554C1072 554 1018 606 954 676C848 792 606 804 500 676C424 584 430 454 473 376" stroke="#2B2B2B" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>

  <path d="M858 456L730 510" stroke="#2B2B2B" stroke-width="2.8" marker-end="url(#arrow)"/>
  <text x="796" y="490" class="label">No</text>

  <path d="M754 556H792" stroke="#2B2B2B" stroke-width="2.8" marker-end="url(#arrow)"/>
  <text x="772" y="542" class="label">Yes</text>

  <path d="M644 658V672" stroke="#2B2B2B" stroke-width="2.8" marker-end="url(#arrow)"/>
  <text x="658" y="666" class="label">No</text>

  <path d="M1430 322H1466" stroke="#8E8E8E" stroke-width="1.8"/>
  <path d="M1430 434H1466" stroke="#8E8E8E" stroke-width="1.8"/>
  <path d="M1450 592V620" stroke="#8E8E8E" stroke-width="1.8"/>
  <path d="M1342 358V412" stroke="#8E8E8E" stroke-width="1.8" stroke-dasharray="5 5"/>
  <path d="M1342 588V620" stroke="#8E8E8E" stroke-width="1.8" stroke-dasharray="5 5"/>

  <circle cx="1466" cy="322" r="4" fill="#8E8E8E"/>
  <circle cx="1466" cy="434" r="4" fill="#8E8E8E"/>
  <circle cx="1450" cy="620" r="4" fill="#8E8E8E"/>

  <line x1="88" y1="758" x2="1508" y2="758" stroke="#D0D0D0"/>
  <text x="88" y="796" class="caption">If no tool is needed, the controller either answers directly or asks for one missing constraint.</text>
</svg>
